<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{NAME}} | Link Hub</title>
    <meta name="description" content="{{BIO}}">
    
    <!-- SF Pro System Font mimicking styles -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    
    <style>
        :root {
            /* Apple signature color tokens */
            --bg-color: #000000;
            --apple-card-bg: rgba(22, 22, 23, 0.6);
            --apple-border: rgba(255, 255, 255, 0.08);
            --apple-card-hover: rgba(255, 255, 255, 0.08);
            --text-primary: #f5f5f7;
            --text-secondary: #86868b;
            --apple-blue: #0071e3;
            --transition: all 0.35s cubic-bezier(0.25, 1, 0.5, 1);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-primary);
            font-family: "SF Pro Display", -apple-system, BlinkMacSystemFont, "Segoe UI", "Inter", sans-serif;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-start;
            padding: 5rem 1.5rem;
            position: relative;
            overflow-x: hidden;
        }

        /* Apple Dynamic Lighting Ambient Background Blur */
        .ambient-glow {
            position: absolute;
            width: 600px;
            height: 600px;
            background: radial-gradient(circle, rgba(120, 119, 198, 0.08) 0%, transparent 60%);
            top: -200px;
            left: 50%;
            transform: translateX(-50%);
            z-index: -1;
            pointer-events: none;
        }

        .container {
            width: 100%;
            max-width: 480px;
            display: flex;
            flex-direction: column;
            align-items: center;
            z-index: 1;
        }

        /* Profil bo'limi */
        .profile {
            display: flex;
            flex-direction: column;
            align-items: center;
            margin-bottom: 3.5rem;
            text-align: center;
        }

        .avatar-container {
            position: relative;
            width: 100px;
            height: 100px;
            margin-bottom: 1.5rem;
        }

        .avatar {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            object-fit: cover;
            border: 1px solid rgba(255, 255, 255, 0.15);
            background: #1c1c1e;
            box-shadow: 0 8px 30px rgba(0, 0, 0, 0.5);
            transition: var(--transition);
        }

        .avatar-container:hover .avatar {
            transform: scale(1.03);
            border-color: rgba(255, 255, 255, 0.3);
            box-shadow: 0 12px 40px rgba(0, 0, 0, 0.7);
        }

        .name {
            font-size: 1.6rem;
            font-weight: 600;
            letter-spacing: -0.022em;
            color: #ffffff;
            margin-bottom: 0.6rem;
        }

        .bio {
            font-size: 0.95rem;
            font-weight: 400;
            color: var(--text-secondary);
            line-height: 1.5;
            max-width: 380px;
            letter-spacing: -0.011em;
            margin-bottom: 1.5rem;
        }

        /* Apple Premium Monochrome Social Icons */
        .socials {
            display: flex;
            gap: 1.25rem;
            justify-content: center;
            align-items: center;
        }

        .social-link {
            display: flex;
            align-items: center;
            justify-content: center;
            width: 38px;
            height: 38px;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.04);
            border: 1px solid rgba(255, 255, 255, 0.02);
            color: #d2d2d7;
            text-decoration: none;
            transition: var(--transition);
        }

        .social-link:hover {
            color: #ffffff;
            background: rgba(255, 255, 255, 0.1);
            transform: scale(1.05);
        }

        .social-link svg {
            width: 18px;
            height: 18px;
            fill: currentColor;
        }

        /* Apple minimalist havolalar ro'yxati */
        .links-list {
            width: 100%;
            display: flex;
            flex-direction: column;
            gap: 0.9rem;
        }

        .link-card {
            display: flex;
            align-items: center;
            padding: 1.15rem 1.4rem;
            border-radius: 14px;
            background: var(--apple-card-bg);
            border: 1px solid var(--apple-border);
            text-decoration: none;
            color: var(--text-primary);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            transition: var(--transition);
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.2);
        }

        .link-card:hover {
            background: var(--apple-card-hover);
            border-color: rgba(255, 255, 255, 0.15);
            transform: translateY(-1px);
            box-shadow: 0 8px 30px rgba(0, 0, 0, 0.3);
        }

        .link-card:active {
            transform: scale(0.985);
            background: rgba(255, 255, 255, 0.05);
        }

        .link-icon {
            display: flex;
            align-items: center;
            justify-content: center;
            width: 36px;
            height: 36px;
            border-radius: 10px;
            background: rgba(255, 255, 255, 0.05);
            color: #ffffff;
            margin-right: 1.1rem;
            transition: var(--transition);
        }

        .link-card:hover .link-icon {
            background: rgba(255, 255, 255, 0.1);
        }

        .link-icon svg {
            width: 18px;
            height: 18px;
            fill: none;
            stroke: currentColor;
            stroke-width: 2.2;
            stroke-linecap: round;
            stroke-linejoin: round;
        }

        .link-title {
            font-size: 0.98rem;
            font-weight: 500;
            letter-spacing: -0.015em;
            flex-grow: 1;
            text-align: left;
        }

        .link-arrow {
            color: var(--text-secondary);
            opacity: 0.5;
            transition: var(--transition);
            display: flex;
            align-items: center;
        }

        .link-card:hover .link-arrow {
            opacity: 0.9;
            color: #ffffff;
            transform: translateX(2px);
        }

        .link-arrow svg {
            width: 16px;
            height: 16px;
            fill: none;
            stroke: currentColor;
            stroke-width: 2.5;
            stroke-linecap: round;
            stroke-linejoin: round;
        }

        /* Apple formatidagi minimal footer */
        .footer {
            margin-top: auto;
            padding-top: 5rem;
            font-size: 0.75rem;
            color: var(--text-secondary);
            font-weight: 400;
            text-align: center;
            letter-spacing: -0.01em;
            line-height: 1.5;
        }

        .footer a {
            color: #f5f5f7;
            text-decoration: none;
            font-weight: 500;
            transition: var(--transition);
        }

        .footer a:hover {
            color: var(--apple-blue);
            text-decoration: underline;
        }
    </style>
</head>
<body>

    <!-- Apple Ambient background light -->
    <div class="ambient-glow"></div>

    <div class="container">
        <!-- Profil qismi -->
        <header class="profile">
            <div class="avatar-container">
                <img class="avatar" src="{{AVATAR}}" alt="{{NAME}} Avatar">
            </div>
            <h1 class="name">{{NAME}}</h1>
            <p class="bio">{{BIO}}</p>
            
            <!-- Ijtimoiy tarmoqlar -->
            <div class="socials">
                {{SOCIALS}}
            </div>
        </header>

        <!-- Havolalar Ro'yxati -->
        <main class="links-list">
            {{LINKS}}
        </main>

        <!-- Footer -->
        <footer class="footer">
            Personal Link Hub &copy; 2026. Built with <a href="https://github.com/google/antigravity" target="_blank" rel="noopener noreferrer">Antigravity</a>. All rights reserved.
        </footer>
    </div>

</body>
</html>
